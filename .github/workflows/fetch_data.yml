name: Get Public Data Every Day

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch_and_save:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch and Merge Data safely (100 rows loop)
        run: |
          # 파이썬을 이용해 1페이지부터 75페이지까지 100개씩 안전하게 긁어모으기
          python3 -c "
          import json
          import urllib.request
          import time
          
          all_items = []
          api_key = '${{ secrets.DATA_GO_KR_KEY }}'
          
          # 1페이지부터 75페이지까지 반복 (총 7,500개 커버)
          for page in range(1, 76):
              url = f'http://apis.data.go.kr/1661000/materialInfoSvc/getMaterialList?serviceKey={api_key}&pageNo={page}&numOfRows=100&dataType=JSON'
              
              for retry in range(3): # 서버가 응답 안 하면 최대 3번 다시 시도
                  try:
                      req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                      with urllib.request.urlopen(req, timeout=10) as response:
                          res_body = response.read().decode('utf-8')
                          data = json.loads(res_body)
                          
                          items = data.get('body', {}).get('items', [])
                          if items:
                              all_items.extend(items)
                              print(f'[{page}/75] {len(items)}개 수집 완료 (누적: {len(all_items)}개)')
                          break
                  except Exception as e:
                      print(f'[{page}/75] 시도 {retry+1} 실패, 다시 시도 중... 오류:', e)
                      time.sleep(1)
          
          # 깨진 글자나 에러 없는 완벽한 형태의 데이터 파일로 저장
          merged = {'body': {'items': all_items}}
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(merged, f, ensure_ascii=False)
          
          print('===> 최종 안전 수집 완료! 총 개수:', len(all_items))
          "

      - name: Commit and Push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          git diff-index --quiet HEAD || git commit -m "Update public data perfect loop"
          git push
